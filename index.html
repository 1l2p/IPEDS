<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPEDS Explorer 2024</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card: #fff;
    --border: #dee2e6;
    --text: #212529;
    --muted: #6c757d;
    --primary: #0d6efd;
    --primary-hover: #0b5ed7;
    --accent: #e9ecef;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  header h1 { font-size: 1.25rem; font-weight: 700; white-space: nowrap; }
  header .badge { background: var(--primary); color: #fff; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 10px; }

  .filters { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select {
    padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.875rem; background: var(--card); color: var(--text);
  }
  .filters input[type="search"] { min-width: 220px; }
  .filters select { max-width: 200px; }
  .filters label { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 0.3rem; cursor: pointer; white-space: nowrap; }
  .range-filter input[type="number"] { width: 60px; padding: 0.4rem 0.4rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.875rem; }
  .filters .sep { width: 1px; height: 24px; background: var(--border); }

  .stats-bar { padding: 0.5rem 1.5rem; font-size: 0.8rem; color: var(--muted); background: var(--accent); display: flex; gap: 1.5rem; flex-wrap: wrap; }

  .table-wrap { overflow-x: auto; padding: 0 1.5rem 2rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
  thead { position: sticky; top: 0; z-index: 2; }
  th { background: var(--card); border-bottom: 2px solid var(--border); padding: 0.5rem 0.6rem; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; font-weight: 600; }
  th:hover { background: var(--accent); }
  th .arrow { font-size: 0.7rem; margin-left: 0.25rem; color: var(--muted); }
  th .arrow.active { color: var(--primary); }
  td { padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:hover td { background: #f0f6ff; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td a { color: var(--primary); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .hbcu-tag { background: #ffc107; color: #000; font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 3px; margin-left: 0.3rem; font-weight: 600; }

  .pagination { display: flex; gap: 0.4rem; align-items: center; justify-content: center; padding: 1rem; }
  .pagination button {
    padding: 0.35rem 0.7rem; border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); cursor: pointer; font-size: 0.8rem;
  }
  .pagination button:hover { background: var(--accent); }
  .pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination span { font-size: 0.8rem; color: var(--muted); }

  .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 1.1rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }

  @media (max-width: 768px) {
    .filters { gap: 0.5rem; }
    .filters input[type="search"] { min-width: 100%; }
    header { padding: 0.75rem 1rem; }
    .table-wrap { padding: 0 0.5rem 2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>IPEDS Explorer</h1>
  <span class="badge">2024</span>
</header>

<div class="filters" id="filters">
  <input type="search" id="search" placeholder="Search institutions..." autocomplete="off">
  <div class="sep"></div>
  <select id="stateFilter"><option value="">All States</option></select>
  <select id="sectorFilter"><option value="">All Sectors</option></select>
  <label><input type="checkbox" id="hbcuFilter"> HBCU only</label>
  <div class="sep"></div>
  <select id="sizeFilter">
    <option value="">Any Enrollment</option>
    <option value="1000">1,000+</option>
    <option value="5000">5,000+</option>
    <option value="10000">10,000+</option>
    <option value="20000">20,000+</option>
  </select>
  <div class="sep"></div>
  <label class="range-filter">Adm Rate ≥ <input type="number" id="admRateFilter" min="0" max="100" step="5" placeholder="e.g. 50"> %</label>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="table-wrap">
  <div class="loading" id="loading">Loading IPEDS data...</div>
  <table id="dataTable" style="display:none">
    <thead>
      <tr id="headerRow"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No institutions match your filters.</div>
</div>

<div class="pagination" id="pagination"></div>

<script>
const COLUMNS = [
  { key: "name", label: "Institution", type: "string", render: renderName },
  { key: "city", label: "City", type: "string" },
  { key: "state", label: "State", type: "string" },
  { key: "sector", label: "Sector", type: "string" },
  { key: "totalEnroll", label: "Enrollment", type: "number", fmt: fmtNum },
  { key: "gradRate", label: "Grad Rate", type: "number", fmt: fmtPct },
  { key: "admRate", label: "Adm Rate", type: "number", fmt: fmtPct },
  { key: "satMid", label: "SAT Mid", type: "number", fmt: fmtNum },
  { key: "actMid", label: "ACT Mid", type: "number", fmt: fmtNum },
  { key: "enrollBlack", label: "Black", type: "number", fmt: fmtNum },
  { key: "enrollHispanic", label: "Hispanic", type: "number", fmt: fmtNum },
  { key: "enrollWhite", label: "White", type: "number", fmt: fmtNum },
];

const PAGE_SIZE = 50;
let allData = [];
let filtered = [];
let sortKey = "totalEnroll";
let sortAsc = false;
let currentPage = 0;

function fmtNum(v) { return v != null ? v.toLocaleString() : "—"; }
function fmtPct(v) { return v != null ? v.toFixed(1) + "%" : "—"; }

function renderName(row) {
  let html = "";
  if (row.webAddr) {
    let url = row.webAddr;
    if (url && !url.startsWith("http")) url = "https://" + url;
    html = `<a href="${url}" target="_blank" rel="noopener">${esc(row.name)}</a>`;
  } else {
    html = esc(row.name);
  }
  if (row.hbcu) html += ' <span class="hbcu-tag">HBCU</span>';
  return html;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function init() {
  const resp = await fetch("data.json");
  const json = await resp.json();
  allData = json.data;

  // Populate filter dropdowns
  const stateSelect = document.getElementById("stateFilter");
  json.states.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    stateSelect.appendChild(opt);
  });
  const sectorSelect = document.getElementById("sectorFilter");
  json.sectors.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    sectorSelect.appendChild(opt);
  });

  buildHeader();
  applyFilters();

  document.getElementById("loading").style.display = "none";
  document.getElementById("dataTable").style.display = "";

  // Wire up filter events
  document.getElementById("search").addEventListener("input", debounce(applyFilters, 200));
  document.getElementById("stateFilter").addEventListener("change", applyFilters);
  document.getElementById("sectorFilter").addEventListener("change", applyFilters);
  document.getElementById("hbcuFilter").addEventListener("change", applyFilters);
  document.getElementById("sizeFilter").addEventListener("change", applyFilters);
  document.getElementById("admRateFilter").addEventListener("input", debounce(applyFilters, 300));
}

function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function buildHeader() {
  const row = document.getElementById("headerRow");
  COLUMNS.forEach(col => {
    const th = document.createElement("th");
    th.dataset.key = col.key;
    th.innerHTML = `${col.label} <span class="arrow" id="arrow-${col.key}"></span>`;
    th.addEventListener("click", () => toggleSort(col.key));
    row.appendChild(th);
  });
  updateSortArrows();
}

function toggleSort(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = false; }
  updateSortArrows();
  sortData();
  currentPage = 0;
  renderTable();
}

function updateSortArrows() {
  COLUMNS.forEach(col => {
    const el = document.getElementById("arrow-" + col.key);
    if (col.key === sortKey) {
      el.className = "arrow active";
      el.textContent = sortAsc ? "▲" : "▼";
    } else {
      el.className = "arrow";
      el.textContent = "";
    }
  });
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const state = document.getElementById("stateFilter").value;
  const sector = document.getElementById("sectorFilter").value;
  const hbcuOnly = document.getElementById("hbcuFilter").checked;
  const minSize = parseInt(document.getElementById("sizeFilter").value) || 0;
  const minAdmRate = parseFloat(document.getElementById("admRateFilter").value);

  filtered = allData.filter(r => {
    if (q && !r.name.toLowerCase().includes(q) && !r.city.toLowerCase().includes(q)) return false;
    if (state && r.state !== state) return false;
    if (sector && r.sector !== sector) return false;
    if (hbcuOnly && !r.hbcu) return false;
    if (minSize && (!r.totalEnroll || r.totalEnroll < minSize)) return false;
    if (minAdmRate > 0 && (r.admRate == null || r.admRate < minAdmRate)) return false;
    return true;
  });

  sortData();
  currentPage = 0;
  renderTable();
  updateStats();
}

function sortData() {
  const col = COLUMNS.find(c => c.key === sortKey);
  const isNum = col && col.type === "number";
  filtered.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (va == null) va = isNum ? -Infinity : "";
    if (vb == null) vb = isNum ? -Infinity : "";
    let cmp;
    if (isNum) {
      cmp = va - vb;
    } else {
      cmp = String(va).localeCompare(String(vb));
    }
    return sortAsc ? cmp : -cmp;
  });
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  const start = currentPage * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  if (filtered.length === 0) {
    tbody.innerHTML = "";
    document.getElementById("empty").style.display = "";
    document.getElementById("pagination").innerHTML = "";
    return;
  }
  document.getElementById("empty").style.display = "none";

  let html = "";
  page.forEach(row => {
    html += "<tr>";
    COLUMNS.forEach(col => {
      const cls = col.type === "number" ? ' class="num"' : "";
      let val;
      if (col.render) {
        val = col.render(row);
      } else if (col.fmt) {
        val = col.fmt(row[col.key]);
      } else {
        val = esc(String(row[col.key] ?? "—"));
      }
      html += `<td${cls}>${val}</td>`;
    });
    html += "</tr>";
  });
  tbody.innerHTML = html;
  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const div = document.getElementById("pagination");
  if (totalPages <= 1) { div.innerHTML = ""; return; }

  let html = "";
  html += `<button ${currentPage === 0 ? "disabled" : ""} onclick="goPage(${currentPage - 1})">← Prev</button>`;
  html += `<span>Page ${currentPage + 1} of ${totalPages}</span>`;
  html += `<button ${currentPage >= totalPages - 1 ? "disabled" : ""} onclick="goPage(${currentPage + 1})">Next →</button>`;
  div.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateStats() {
  const bar = document.getElementById("statsBar");
  const total = filtered.length;
  const withGrad = filtered.filter(r => r.gradRate != null).length;
  const withAdm = filtered.filter(r => r.admRate != null).length;
  const totalEnroll = filtered.reduce((s, r) => s + (r.totalEnroll || 0), 0);
  const avgGrad = withGrad > 0
    ? (filtered.reduce((s, r) => s + (r.gradRate || 0), 0) / withGrad).toFixed(1)
    : "—";

  bar.innerHTML = `
    <span><strong>${total.toLocaleString()}</strong> institutions</span>
    <span>Total enrollment: <strong>${totalEnroll.toLocaleString()}</strong></span>
    <span>Avg grad rate: <strong>${avgGrad}%</strong> (${withGrad.toLocaleString()} reporting)</span>
    <span>${withAdm.toLocaleString()} with admissions data</span>
  `;
}

init();
</script>
</body>
</html>
